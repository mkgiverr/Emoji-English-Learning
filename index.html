function playTone(type) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if (type === 'win') {
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'new_sticker') {
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.setValueAtTime(500, audioCtx.currentTime + 0.08);
            osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.16);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(70, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'highscore') {
            // Создаем торжественный фанфар "ТА-ДА!" из двух мощных аккордов
            const now = audioCtx.currentTime;
            
            // Нота "ТА" (короткая, бодрая)
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523.25, now); // До (C5)
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.setValueAtTime(0.15, now + 0.1);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
            
            // Нота "ДА-А-АМ!" (длинная, победная, создаем второй осциллятор для сочности)
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc2.type = 'sine';
            
            osc.frequency.setValueAtTime(659.25, now + 0.16); // Ми (E5)
            osc2.frequency.setValueAtTime(783.99, now + 0.16); // Соль (G5) — вместе они дают мажорный аккорд
            
            gain.gain.setValueAtTime(0.15, now + 0.16);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
            
            gain2.gain.setValueAtTime(0.1, now + 0.16);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
            
            osc.start(now); osc.stop(now + 0.8);
            osc2.start(now + 0.16); osc2.stop(now + 0.8);
            return; // Прерываем функцию, так как osc2 управляется отдельно
        }
    } catch(e) {}
}
