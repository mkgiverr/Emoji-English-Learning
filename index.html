function playTone(type) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'win') {
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'new_sticker') {
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.setValueAtTime(500, audioCtx.currentTime + 0.08);
            osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.16);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(70, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);

            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

function spawnConfetti() {
    const layer = document.getElementById('confetti-layer');
    const emojis = ['🎉', '✨', '🌟', '🍭', '🔥', '⚡'];
    for (let i = 0; i < 12; i++) {
        const el = document.createElement('div');
        el.className = 'pop-emoji'; el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = '50%'; el.style.top = '50%';
        const angle = Math.random() * Math.PI * 2; const dist = 60 + Math.random() * 80;
        el.style.setProperty('--x', `${Math.cos(angle) * dist}px`); el.style.setProperty('--y', `${Math.sin(angle) * dist}px`);
        layer.appendChild(el); setTimeout(() => el.remove(), 600);
    }
}

function updateScore(pts) {
    score = Math.max(0, score + pts);
    document.getElementById('score').innerText = score;
    if (pts > 0) {
        streak++;
        if(streak >= 3) {
            document.getElementById('streak-badge').style.display = 'inline-block';
            document.getElementById('streak').innerText = streak;
            if (streak >= 5) document.getElementById('card').className = "game-card super-streak";
        }
    } else if (pts < 0) {
        streak = 0; document.getElementById('streak-badge').style.display = 'none';
        document.getElementById('card').className = "game-card";
    }
    let rank = "Noob 🍼";
    if (score >= 200) rank = "Mega Boss 👑";
    else if (score >= 100) rank = "Cyber Hero ⚡";
    else if (score >= 50) rank = "Pro Gamer 🎮";
    else if (score >= 15) rank = "Cool Kid 😎";
    document.getElementById('rank').innerText = rank;
}

function buildAlbum() {
    const grid = document.getElementById('album-grid');
    grid.innerHTML = "";
    data.forEach((item) => {
        const el = document.createElement('div');
        if (unlockedStickers.includes(item.a)) {
            el.className = "sticker"; el.innerText = item.icon; el.title = item.h;
        } else {
            el.className = "sticker locked"; el.innerText = "?";
        }
        grid.appendChild(el);
    });
    document.getElementById('collected-count').innerText = unlockedStickers.length;
}

function loadLevel() {
    if (gameMode === 'ended' || gameMode === 'time-waiting') return;
    document.getElementById('next').style.display = 'none';
    document.getElementById('skip-btn').style.display = 'inline-block';
    document.getElementById('word-input').value = "";
    const container = document.getElementById('image-container');
    container.className = "silhouette"; container.style.transform = "scale(1)";
    container.innerText = data[cur].icon;
    const hintBtn = document.getElementById('hint-btn');
    if (isTextMode) {
        document.getElementById('mic-btn').style.display = 'none';
        document.getElementById('text-input-container').style.display = 'flex';

        document.getElementById('feedback').innerText = "Tap mic to speak";
        hintBtn.innerText = "🔊 Hear Hint";
    }

function winRound() {
    if (gameMode === 'ended' || gameMode === 'time-waiting') return;
    spawnConfetti();
    const currentWord = data[cur].a;
    
    if (!unlockedStickers.includes(currentWord)) {
        unlockedStickers.push(currentWord);
        localStorage.setItem('emoji_stickers', JSON.stringify(unlockedStickers));
        playTone('new_sticker');
        buildAlbum();
        document.getElementById('feedback').innerText = "NEW STICKER UNLOCKED! 🎉 It's " + data[cur].h;
    } else {
        playTone('win');
        document.getElementById('feedback').innerText = "Correct! It's " + data[cur].h;
    }

    const img = document.getElementById('image-container');
    img.className = ""; img.style.transform = "scale(1.2)";
    
    if (gameMode === 'time') {
        timeLeft += 3;
        document.getElementById('timer-val').innerText = timeLeft;
        setTimeout(() => { nextLevel(); }, 800);
    } else {
        document.getElementById('next').style.display = 'inline-block';
        document.getElementById('skip-btn').style.display = 'none';
    }
    updateScore(10);
}

function nextLevel() {
    if (gameMode === 'ended' || gameMode === 'time-waiting') return;
    cur = Math.floor(Math.random() * data.length);
    loadLevel();
}

function checkTextWord() {
    if (document.getElementById('word-input').value.trim().toLowerCase() === data[cur].a) winRound();
    else { 
        playTone('fail'); 
        if(gameMode === 'time') timeLeft = Math.max(0, timeLeft - 5);
        document.getElementById('feedback').innerText = "Wrong spelling. Try again!"; 
    }
}

function startRecognition() {
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'en-US';
    rec.onstart = () => { document.getElementById('feedback').innerText = "Listening..."; };
    rec.onresult = (e) => {
        if (e.results[0][0].transcript.toLowerCase().includes(data[cur].a)) winRound();
        else { 
            playTone('fail'); 
            if(gameMode === 'time') timeLeft = Math.max(0, timeLeft - 5);
            document.getElementById('feedback').innerText = "Try again!"; 
        }
    };
    rec.start();
}

        document.getElementById('mode-classic').className = "btn-mode active";
        document.getElementById('mode-time').className = "btn-mode";
        document.getElementById('timer-display').style.display = 'none';
        document.getElementById('input-toggle-container').style.display = 'flex';
        document.getElementById('action-buttons-container').style.display = 'flex';
        document.getElementById('game-heading').innerText = "What is this?";
        document.getElementById('next').innerText = "Next ➔";
        document.getElementById('next').onclick = nextLevel;
        nextLevel();
    }
}

function startTimeAttackCountdown() {
    gameMode = 'time';
    document.getElementById('next').innerText = "Next ➔";
    document.getElementById('next').onclick = nextLevel;
    document.getElementById('input-toggle-container').style.display = 'flex';
    document.getElementById('action-buttons-container').style.display = 'flex';
    document.getElementById('game-heading').innerText = "What is this?";
    
    timeLeft = 60;
    document.getElementById('timer-val').innerText = timeLeft;
    
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-val').innerText = timeLeft;
        if(timeLeft <= 0) {
            clearInterval(timerInterval);
            endTimeAttack();
        }
    }, 1000);
    nextLevel();
}

function endTimeAttack() {
    gameMode = 'ended';
    playTone('fail');
    document.getElementById('image-container').innerText = "🏁";
    document.getElementById('image-container').className = "";
    document.getElementById('game-heading').innerText = "Time's Up!";
    document.getElementById('feedback').innerText = `Amazing job! You scored ${score} points!`;
    
    document.getElementById('mic-btn').style.display = 'none';
    document.getElementById('text-input-container').style.display = 'none';
    document.getElementById('input-toggle-container').style.display = 'none';
    document.getElementById('action-buttons-container').style.display = 'none';
    
    document.getElementById('next').innerText = "Play Classic Mode ➔";
    document.getElementById('next').style.display = 'inline-block';
    document.getElementById('next').onclick = () => {
        document.getElementById('next').innerText = "Next ➔";
        document.getElementById('next').onclick = nextLevel;
        setGameMode('classic');
    };
}

function setInputMode(type) {
    if (gameMode === 'ended' || gameMode === 'time-waiting') return;
    isTextMode = (type === 'text');
    document.getElementById('input-voice').className = "btn-mode" + (type === 'voice' ? ' active' : '');
    document.getElementById('input-text').className = "btn-mode" + (type === 'text' ? ' active' : '');
    loadLevel();
}

document.getElementById('mic-btn').onclick = startRecognition;
document.getElementById('check-btn').onclick = checkTextWord;
document.getElementById('word-input').onkeypress = (e) => { if(e.key === 'Enter') checkTextWord(); };
document.getElementById('next').onclick = nextLevel;
document.getElementById('skip-btn').onclick = () => { 
    playTone('fail'); 
    updateScore(-5); 
    if(gameMode === 'time') timeLeft = Math.max(0, timeLeft - 5);
    nextLevel(); 
};

document.getElementById('hint-btn').onclick = () => {
    if (gameMode === 'ended' || gameMode === 'time-waiting') return;
    if (isTextMode) {
        let w = data[cur].a;
        document.getElementById('feedback').innerText = `Hint: ${w[0]} ${"_ ".repeat(w.length - 2)} ${w[w.length - 1]}`;
    } else {
        const u = new SpeechSynthesisUtterance("It is " + data[cur].h);
        u.voice = speechSynthesis.getVoices().find(v => v.lang.startsWith('en')) || null;
        speechSynthesis.speak(u);
    }
};

speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
buildAlbum();
loadLevel();
</script>
